<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q3 Skills Test</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container rounded mt-5 form-box ">
<h2 class="text-center text-white">Cine Sophia</h2><hr>
<form>
<h5>Customer Info</h5>

<label>Full Name</label>
<input type="text" id="name" class="form-control" placeholder="Full Name"><br>
<h5>Ticket Order</h5>
<label>Number of Tickets (₱250 each)</label>
<input type="number" id="qty" class="form-control" placeholder="Amount"><br>
<hr>
<h5>Payment Summary</h5>
<p>Subtotal: ₱ <span id="subtotal">0</span></p>
<p>Service Fee: ₱50</p><hr>
<h4>Total: ₱ <span id="total">0</span></h4><br>

<button type="button" class="btn btn-dark" onclick="computeTotal()">Calculate</button>
<button type="reset" class="btn btn-dark" onclick="resetForm()">Reset</button>

<script src="main.js"></script>
</form>
</div>
